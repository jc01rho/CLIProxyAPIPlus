# Headroom sidecar for CLIProxyAPIPlus (host process mode)
#
# Architecture:
#   Client → Headroom (8787) → host.docker.internal:8317 (cli-proxy-api-plus on host)
#
# Usage:
#   1. Run cli-proxy-api-plus as a host process (binary or go run)
#   2. docker compose -f docker-compose.headroom.yml up -d
#   3. Point your client at http://localhost:8787 instead of http://localhost:8317
#
# Linux note: extra_hosts with host-gateway is required so the container
# can resolve host.docker.internal to the host machine.

services:
  headroom:
    image: ghcr.io/chopratejas/headroom:latest
    container_name: cliproxy-headroom
    command: ["proxy", "--port", "8787", "--target", "http://host.docker.internal:8317"]
    environment:
      HEADROOM_LOG_LEVEL: ${HEADROOM_LOG_LEVEL:-info}
      HEADROOM_MIN_TOKENS: ${HEADROOM_MIN_TOKENS:-200}
      HEADROOM_COMPRESSION_STRATEGY: ${HEADROOM_COMPRESSION_STRATEGY:-auto}
    ports:
      - "8787:8787"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
